# Pin a light theme so Streamlit's own text/controls always match the design,
# regardless of the viewer's system dark-mode setting.
[theme]
base = "light"
primaryColor = "#F4A91F"
backgroundColor = "#F6F3EC"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0C1E26"
font = "sans serif"

[client]
toolbarMode = "auto"